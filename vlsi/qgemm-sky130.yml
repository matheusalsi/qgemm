# Technology Setup
# Technology used is Sky130
vlsi.core.technology: "hammer.technology.sky130"

vlsi.core.max_threads: 12

# Technology paths
technology.sky130:
  sky130A: "/home/inf01185/matheus.almeida/.conda-sky130/share/pdk/sky130A"
  sram22_sky130_macros: "/home/inf01185/matheus.almeida/sram22_sky130_macros"

# General Hammer Inputs
# Hammer will auto-generate a CPF for simple power designs; see hammer/src/hammer-vlsi/defaults.yml for more info
vlsi.inputs.power_spec_mode: "auto"
vlsi.inputs.power_spec_type: "cpf"

# Specify clock signals
vlsi.inputs.clocks: [
  {name: "clock", period: "30ns", uncertainty: "3ns"}
]

# Generate Make include to aid in flow
vlsi.core.build_system: make

# SRAM Compiler compiler options
vlsi.core.sram_generator_tool: "hammer.technology.sky130.sram_compiler"
